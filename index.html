<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Goopi App | Donde todo sucede</title>

    <!-- PWA Settings -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a0b2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon"
        href="https://goopiapp.com/wp-content/uploads/2026/02/cropped-e628f4e1-a38c-4da8-ae79-343f049eb3c3.png">

    <link rel="stylesheet" href="style.css?v=37.6">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Firebase SDK (Version 9.15.0 - REQUIRED FOR SOCIAL) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.15.0/firebase-app-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.15.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.15.0/firebase-storage-compat.js"></script>
</head>

<body>
    <div id="app">
        <!-- Header -->
        <header class="app-header">
            <div class="logo-container" onclick="navigate('home')" style="cursor: pointer;">
                <img src="https://goopiapp.com/wp-content/uploads/2026/02/cropped-e628f4e1-a38c-4da8-ae79-343f049eb3c3.png"
                    alt="Goopi Logo">
            </div>
            <div class="user-actions">
                <button onclick="toggleSearch()"
                    style="background:none; border:none; color:white; font-size:20px; margin-right: 15px; cursor: pointer;">
                    <i class="fas fa-search"></i>
                </button>
                <button id="header-user-btn" onclick="navigate('profile')"
                    style="background:none; border:none; color:var(--secondary-cyan); font-size:22px; cursor: pointer;">
                    <i class="fas fa-user-circle"></i>
                </button>
            </div>
        </header>

        <!-- Main Content (Home) -->
        <main class="main-content" id="main-view">
            <!-- Content injected via app.js -->
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="#" class="nav-item active" data-view="home" onclick="navigate('home')">
                <i class="fas fa-home"></i>
                <span>Inicio</span>
            </a>
            <a href="#" class="nav-item" data-view="community" onclick="navigate('community')"
                style="background: rgba(186, 150, 255, 0.1); border-radius: 15px; padding: 5px 10px;">
                <i class="fas fa-comment-dots" style="color: var(--secondary-lilac); font-size: 20px;"></i>
                <span style="font-weight: 800; color: var(--secondary-lilac);">Social</span>
            </a>
            <a href="#" class="nav-item" data-view="taxi" onclick="navigate('taxi')">
                <i class="fas fa-taxi"></i>
                <span>Taxi</span>
            </a>
            <a href="#" class="nav-item" data-view="news" onclick="navigate('news')">
                <i class="fas fa-newspaper"></i>
                <span>Noticias</span>
            </a>
            <a href="#" class="nav-item" data-view="profile" onclick="navigate('profile')">
                <i class="fas fa-user-circle"></i>
                <span>Perfil</span>
            </a>
        </nav>

        <!-- Details Overlay -->
        <div id="details-overlay" class="details-overlay">
            <button class="back-btn" onclick="closeDetails()">
                <i class="fas fa-arrow-left"></i> Volver
            </button>
            <div id="details-content"></div>
        </div>

        <!-- Search Overlay -->
        <div id="search-overlay" class="search-overlay">
            <div class="search-header">
                <button class="back-btn" onclick="toggleSearch()" style="margin-bottom: 0;">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <input type="text" id="main-search-input" placeholder="Buscar negocios o productos..."
                    onkeyup="handleSearch(event)">
            </div>
            <div id="search-results" class="search-results">
                <!-- Search results will load here -->
            </div>
        </div>
    </div>

    <script src="app.js?v=37.6"></script>
</body>

</html>
